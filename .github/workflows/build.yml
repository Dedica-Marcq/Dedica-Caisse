name: Build & Release Dedica'Caisse

on:
  push:
    tags:
      - 'v*' # Ex: git push origin v0.5.0
  workflow_dispatch:

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            arch: x64
          - os: windows-latest
            platform: win
            arch: arm64
          - os: macos-latest
            platform: mac
            arch: x64
          - os: macos-latest
            platform: mac
            arch: arm64
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: ubuntu-latest
            platform: linux
            arch: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and publish for ${{ matrix.platform }}-${{ matrix.arch }}
        uses: samuelmeuli/action-electron-builder@v1
        with:
          args: --${{ matrix.platform }} --${{ matrix.arch }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload dist folder (backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: DedicaCaisse-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/
