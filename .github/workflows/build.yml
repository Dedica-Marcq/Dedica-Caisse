name: Build & Release Dedica'Caisse

on:
  push:
    branches:
      - main
  workflow_dispatch:
  
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            arch: x64
          - os: macos-latest
            platform: mac
            arch: arm64
          - os: windows-latest
            platform: win
            arch: x64
          - os: windows-latest
            platform: win
            arch: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        uses: samuelmeuli/action-electron-builder@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          build_script_name: dist
          args: --${{ matrix.platform }} --${{ matrix.arch }} --publish always
          release: true
          package_root: .
          skip_build: false
          use_vue_cli: false
          max_attempts: 1

      - name: Upload build artifacts (backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: DedicaCaisse-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/
