<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Réglages • Dédica'Caisse</title>
  <link rel="stylesheet" href="src/style/style.css">
  <link rel="stylesheet" href="src/style/reglages.css">
  <link rel="stylesheet" href="node_modules/bootstrap-icons/font/bootstrap-icons.css">
</head>
<body>
  <header>
    <div class="navbar">
      <div class="logo">Dédica'Caisse</div>
      <nav>
        <a href="caisse.html">Caisse</a>
        <a href="ventes.html">Ventes</a>
        <a href="articles.html">Articles</a>
        <a href="reglages.html" class="active">Réglages</a>
      </nav>
      <div class="clock">--:--</div>
    </div>
  </header>

  <main>
    <div class="settings-container">


      <!-- Section Réseau -->
      <section class="settings-card">
        <h3><i class="bi bi-wifi"></i> Paramètres de Dédica'Scan</h3>
        <label>Ouvrez Dédica'Scan et entrez ces paramètres dans la séction "Réglages" de l'app.</label>
        <div class="form-group">
          <label>Adresse IP :</label>
          <input type="text" id="ip" value="[IP Inconnu]">
        </div>
        <div class="form-group">
          <label>Port :</label>
          <input type="number" id="port" placeholder="3001">
        </div>
      </section>

      <!-- Section Factures -->
      <section class="settings-card">
        <h3><i class="bi bi-folder2-open"></i> Enregistrement des factures</h3>
        <div class="form-group">
          <label>Chemin :</label>
          <input type="text" id="facture-path" placeholder="/Users/basile/Documents/Dedica_Caisse">
        </div>
      </section>

      <!-- Section Base de données -->
      <section class="settings-card">
        <h3><i class="bi bi-database"></i> Connexion à la base de données MySQL</h3>
        <div class="form-group">
          <label>Hôte :</label>
          <input type="text" id="db-host" placeholder="localhost">
        </div>
        <div class="form-group">
          <label>Port :</label>
          <input type="number" id="db-port" placeholder="3306">
        </div>
        <div class="form-group">
          <label>Utilisateur :</label>
          <input type="text" id="db-user" placeholder="root">
        </div>
        <div class="form-group">
          <label>Mot de passe :</label>
          <input type="password" id="db-pass" placeholder="••••••••">
        </div>
        <div class="form-group">
          <label>Base de données :</label>
          <input type="text" id="db-name" placeholder="dedicacaisse">
        </div>
      </section>

      <!-- Boutons -->
      <div class="settings-actions">
        <button id="btn-save"><i class="bi bi-check-circle"></i> Sauvegarder</button>
        <button id="btn-reset"><i class="bi bi-arrow-counterclockwise"></i> Réinitialiser</button>
      </div>
    </div>
  </main>

  <script src="src/script/heure.js"></script>
  <script>
    // Default values for settings
    const DEFAULTS = {
      ip: "[IP Inconnu]",
      port: "3001",
      "facture-path": "/Users/basile/Documents/Dedica_Caisse",
      "db-host": "localhost",
      "db-port": "3306",
      "db-user": "root",
      "db-pass": "",
      "db-name": "dedicacaisse"
    };

    // Load settings from localStorage or defaults
    function loadSettings() {
      for (const key in DEFAULTS) {
        const el = document.getElementById(key);
        if (!el) continue;
        let value = localStorage.getItem("reglage_" + key);
        if (value === null) value = DEFAULTS[key];
        el.value = value;
      }
    }

    // Save current values to localStorage
    function saveSettings() {
      for (const key in DEFAULTS) {
        const el = document.getElementById(key);
        if (!el) continue;
        localStorage.setItem("reglage_" + key, el.value);
      }
      alert("Réglages sauvegardés !");
    }

    // Reset all fields to defaults and save to localStorage
    function resetSettings() {
      for (const key in DEFAULTS) {
        const el = document.getElementById(key);
        if (!el) continue;
        el.value = DEFAULTS[key];
        localStorage.setItem("reglage_" + key, DEFAULTS[key]);
      }
    }

    // Attempt to get local IP and set if field is not already set by user
    function getLocalIP(callback) {
      const pc = new RTCPeerConnection({iceServers: []});
      pc.createDataChannel('');
      pc.createOffer()
        .then(offer => pc.setLocalDescription(offer))
        .catch(err => console.error('Erreur lors de la création de l\'offre', err));
      pc.onicecandidate = event => {
        if (!event || !event.candidate) return;
        const ipRegex = /([0-9]{1,3}(\.[0-9]{1,3}){3})/;
        const ipMatch = event.candidate.candidate.match(ipRegex);
        if (ipMatch) {
          callback(ipMatch[1]);
          pc.onicecandidate = null;
          pc.close();
        }
      };
    }

    // Set up event listeners and initialize fields
    window.addEventListener("DOMContentLoaded", () => {
      loadSettings();
      // If IP is default, try to fill with detected IP
      getLocalIP(ip => {
        const ipInput = document.getElementById('ip');
        if (ipInput && (ipInput.value === DEFAULTS.ip || !ipInput.value)) {
          ipInput.value = ip;
        }
      });
      document.getElementById("btn-save").addEventListener("click", saveSettings);
      document.getElementById("btn-reset").addEventListener("click", () => {
        resetSettings();
        alert("Réglages réinitialisés !");
      });
    });
  </script>
</body>
</html>
