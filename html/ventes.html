<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ventes • Dédica'Caisse</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/articles-ventes.css">
</head>

<body>
  <!-- Barre de navigation -->
  <header>
    <div class="navbar">
      <div class="logo">
        <img data-dynamic-image="Logo.png" alt="Logo Dédica'Marcq" class="logo-img">
        <span>Dédica'Caisse</span>
      </div>
      <nav>
          <button onclick="window.location.href = 'caisse.html';">Caisse</button>
          <button onclick="window.location.href = '#';" class="active">Ventes</button>
          <button onclick="window.location.href = 'articles.html';">Livres</button>
          <button onclick="window.location.href = 'rapport.html';">Statistiques</button>
      </nav>
      <div class="clock">--:--</div>
    </div>
  </header>

  <!-- Contenu principal -->
  <main class="container">

    <!-- Colonne gauche : Liste des ventes -->
    <aside class="sidebar">
      <h3>Liste des ventes</h3>
      <div id="ventes-list" class="button-list">
        <!-- Les boutons de ventes seront générés ici -->
      </div>
      <button id="btn-refresh" class="button-primary" >
        <i class="bi bi-arrow-repeat"></i> Rafraîchir
      </button>
    </aside>

    <!-- Colonne droite : Détails -->
    <section class="details">
      <h3>Détails de la vente</h3>
      <div id="details">
        <p>Sélectionnez une vente pour voir les détails.</p>
      </div>
    </section>
    
  </main>

  <!-- Scripts -->
  <script src="../js/images.js"></script>
  <script src="../js/heure.js"></script>
  <script src="../js/vente_review.js"></script>
</body>
</html>
