<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dédica'Scan • Dédica'Caisse</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/assistant.css">
</head>
<body>
    <section class="view">
        <div class="scan-section">
          <!-- gauche : maquette iPhone -->
          <div class="phone-slot">
            <div class="phone-frame">
              <img src="../images/dedica-scan.png" alt="iPhone - Dédica'Scan" class="phone-mock">
            </div>
          </div>

          <!-- droite : contenu (description, QR, TestFlight) -->
          <div class="scan-content">
            <h2><center>Découvrez Dédica'Scan</center></h2>
            <div class="scan-header">
              <p class="lead">Dédica'Scan permet de scanner le code-barre d'un livre et de l'ajouter directement dans le panier du client. Testez l'application via TestFlight.</p>
            </div>

            <div class="scan-body">
              <div class="qr-card">
                <img src="../images/qrcode-dedicacaisse.png" alt="QR code Dédica'Scan" class="qr">
                <!-- TestFlight logo placé sous le QR -->
                <a href="https://testflight.apple.com/join/9n5v1fyj" target="_blank" rel="noopener" class="testflight-link-qr">
                  <img src="../images/testflight.png" alt="Disponible sur TestFlight" class="testflight">
                </a>
              </div>

              <div class="scan-actions">
              </div>
            </div>
          </div>
        </div>
      </section>
</body>
</html>
