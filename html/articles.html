<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Articles • Dédica'Caisse</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/articles-ventes.css">
</head>
<body>
  <header>
    <div class="navbar">
      <div class="logo">Dédica'Caisse</div>
      <nav>
          <button onclick="window.location.href = 'caisse.html';">Caisse</button>
          <button onclick="window.location.href = 'ventes.html';">Ventes</button>
          <button onclick="window.location.href = '#';" class="active">Livres</button>
          <button onclick="window.location.href = 'rapport.html';">Statistiques</button>
      </nav>
      <div class="clock">--:--</div>
    </div>
  </header>
  <main class="container">
    <!-- Colonne gauche -->
    <aside class="sidebar">
      <h3>Liste des articles</h3>
      <div id="dossier-list" class="button-list"></div>
      <button id="btn-add-article" class="button-primary">
        <i class="bi bi-plus-lg"></i> Nouvel article
      </button>
    </aside>

    <!-- Colonne droite -->
    <section class="details">
      <h3>Détails de l’article</h3>
      <div id="details">
        <p>Sélectionnez un article pour voir ses détails.</p>
      </div>
    </section>
  </main>

<script src="../js/heure.js"></script>
<script src="../js/articles.js"></script>
</body>
</html>
