<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rapport • Dédica'Caisse</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/articles-ventes.css">
  <style>
    .dashboard {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 60px); /* Soustrait la hauteur du header */
      padding: 20px;
      overflow: hidden; /* Empêche le scroll infini */
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      height: 100%;
      overflow: hidden; /* Changé de auto à hidden */
    }
    
    /* Empêcher le scroll sur le body */
    body {
      overflow: hidden;
      margin: 0;
      padding: 0;
    }
    
    .card {
      background: white;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      padding: 20px;
      text-align: center;
      background-color: var(--color-primary);
      display: flex;
      flex-direction: column;
      height: 300px; /* Hauteur fixe pour les cartes */
      min-height: 200px; /* Hauteur minimale pour les cartes */

    }
    
    .card.large {
      grid-column: span 3;
      height: 380px; /* Hauteur plus grande pour le graphique des articles */
    }

    /* Conteneur pour les canvas des graphiques */
    .chart-container {
      flex: 1;
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 200px; /* Hauteur minimale pour les graphiques */
    }
    
    #chiffre-affaire, #panier-moyen {
      font-size: 24px;
      font-weight: bold;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <header>
    <div class="navbar">
      <div class="logo">Dédica'Caisse</div>
      <nav>
        <a href="caisse.html">Caisse</a>
        <a href="ventes.html">Ventes</a>
        <a href="articles.html">Articles</a>
        <a href="rapport.html" class="active">Rapport</a>
      </nav>
      <div class="clock">--:--</div>
    </div>
  </header>
  <main class="container dashboard">
    <div class="stats-grid">
      <div class="card">
        <h2>Chiffre d'affaires</h2>
        <p id="chiffre-affaire">-- €</p>
      </div>
      <div class="card">
        <h2>Panier moyen</h2>
        <p id="panier-moyen">-- €</p>
      </div>
      <div class="card">
        <h2>Répartition paiements</h2>
        <div class="chart-container">
          <canvas id="chart-paiements"></canvas>
        </div>
      </div>
      <div class="card large">
        <div class="chart-container">
          <canvas id="chart-top-articles"></canvas>
        </div>
      </div>
    </div>
  </main>
<script src="../js/heure.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="../js/rapport.js"></script>
</body>
</html>
