<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caisse • Dédica'Caisse</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <header>
    <div class="navbar">
      <div class="logo">
        <img data-dynamic-image="Logo.png" alt="Logo Dédica'Marcq" class="logo-img">
        <span>Dédica'Caisse</span>
      </div>
        <nav>
          <button onclick="window.location.href = '#';" class="active">Caisse</button>
          <button onclick="window.location.href = 'ventes.html';">Ventes</button>
          <button onclick="window.location.href = 'articles.html';">Livres</button>
          <button onclick="window.location.href = 'rapport.html';">Statistiques</button>
        </nav>
        <div class="clock">--:--</div>
    </div>
  </header>
  <main>
    <div class="main-content">

    <!------------------>
    <!---- Actions ----->
    <!------------------>
    <div class="actions">
      <h1>Valider le pannier</h1>
      <button id="btn-esc" class="esc"><i class="bi bi-x-circle"></i> Vider le ticket</button>
      <button id="btn-especes"><i class="bi bi-cash"></i> Espèces</button>
      <button id="btn-cheque"><i class="bi bi-vector-pen"></i> Chèque</button>
      <button id="btn-cb"><i class="bi bi-credit-card"></i> Carte Bleue</button>

      <button id="btn-inconnu"><i class="bi bi-plus-circle-dotted"></i> Article Inconnu</button>
      <button onclick="window.location.href = 'dedicascan.html';"><i class="bi bi-upc-scan"></i> Dédica'Scan</button>

      <button style="display: none;" id="download-facture-btn" ><i class="bi bi-file-pdf"></i>Télécharger la facture</button>
      <button style="display: none;" id="send-facture-btn"><i class="bi bi-envelope-at"></i>Envoyer par e-mail</button>
    </div>

    <!------------------>
    <!-- Calculatrice -->
    <!------------------>
    <div class="calculatrice">
      <div class="resultat">0.00 €</div>
      <button>AC</button><button>(—)</button><button>%</button><button>÷</button>
      <button>7</button><button>8</button><button>9</button><button>×</button>
      <button>4</button><button>5</button><button>6</button><button>—</button>
      <button>1</button><button>2</button><button>3</button><button>+</button>
      <button>0</button><button>00</button><button>,</button><button>=</button>
    </div>

    <!------------------>
    <!----- Aricles ---->
    <!------------------>
    <div class="articles">
      <h1>Livres</h1>
      <div class="product-list" id="product-list"></div>
    </div>
    <!------------------>
    <!-- Popup Vente --->
    <!------------------>
    <div id="popup-vente">
      <div class="popup-content">
        <h2 id="popup-titre">Finaliser la vente</h2>
        <br>
        <p><strong>Total : </strong><span id="popup-total">[Inconnu]</span></p>
        <p><strong>Mode de paiment : </strong><span id="popup-modedepaiment">[Inconnu]</span></p>

        <input type="checkbox" id="popup-facture-checkbox">
        <label for="popup-facture-checkbox">Générer une facture ?</label>

        <div id="popup-facture" style="display: none;">
          <label><strong>Nom</strong></label>
          <input type="text" id="popup-client" placeholder="Éric BARGIBANT">
          <label><strong>Email</strong></label>
          <input type="email" id="popup-email" placeholder="eric.bargibant@editionsdelalicorne.fr">
          <label><strong>Adresse</strong></label>
          <input type="text" id="popup-adresse" placeholder="46 Rue de Molpas, 59710 Merignes">
        </div>
        <div class="popup-actions">
          <button id="popup-confirmer">Confirmer</button>
          <button id="popup-annuler">Annuler</button>
        </div>
      </div>
    </div>
    <!------------------>
    <!----- Ticket ----->
    <!------------------>
      <div class="receipt">
        <h3>Ticket de caisse</h3>
        <div class="vente-validee" id="vente-validee" >
          <p>Vente validée avec succès !</p>
        </div>
        <div class="receipt-body" id="receipt-body"></div>
        <p class="total">Total : <strong><span id="receipt-total">0,00 €</span></strong></p>
      </div>
    </div>

    <!------------------>
    <!-- Email Pop-up -->
    <!------------------>
    <div id="email-popup" class="popup" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); align-items:center; justify-content:center;">
      <div style="background:white; padding:20px; border-radius:10px; width:300px; text-align:center;">
        <h3>Envoyer la facture</h3>
        <input type="email" id="email-popup-input" placeholder="Adresse e-mail" style="width:100%; margin:10px 0; padding:5px;">
        <div style="display:flex; justify-content:space-around;">
          <button id="email-popup-cancel">Annuler</button>
          <button id="email-popup-confirm">Envoyer</button>
        </div>
      </div>
    </div>

    <div id="popup-article-inconnu" style="display:none; justify-content:center; align-items:center; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:1000;">
      <div style="background:var(--color-primary); padding:20px; border-radius:10px; max-width:420px; width:90%; color:var(--color-secondary);">
        <h3 style="text-align:center; margin-bottom:10px;">Ajouter un article inconnu</h3>
        <label><strong>Nom</strong></label>
        <input id="unknown-name" type="text" placeholder="Titre de l'article" style="width:100%; padding:8px; margin:6px 0; border-radius:6px; border:1px solid #ccc;">
        <label><strong>Dossier</strong></label>
        <input id="unknown-dossier" type="text" placeholder="Dossier (ex: Poésie)" style="width:100%; padding:8px; margin:6px 0; border-radius:6px; border:1px solid #ccc;">
        <label><strong>Prix (€)</strong></label>
        <input id="unknown-price" type="number" step="0.01" min="0" placeholder="12.50" style="width:100%; padding:8px; margin:6px 0; border-radius:6px; border:1px solid #ccc;">
        <p style="font-size:13px; color:var(--color-gray-700); margin:6px 0;">TVA : <strong>5,50%</strong> — Code-barres : <strong>NULL</strong></p>
        <div style="display:flex; justify-content:flex-end; gap:8px; margin-top:10px;">
          <button id="unknown-cancel" style="background:var(--color-secondary); color:var(--color-white); padding:8px 12px; border-radius:6px; border:none;">Annuler</button>
          <button id="unknown-confirm" style="background:var(--color-accent); color:var(--color-secondary); padding:8px 12px; border-radius:6px; border:none;">Ajouter</button>
        </div>
      </div>
    </div>
    </div>
  </main>
  <script src="../js/images.js"></script>
  <script src="../js/calculatrice.js"></script>
  <script src="../js/vente.js"></script>
  <script src="../js/heure.js"></script>
</body>
</html>
