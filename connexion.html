<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Connexion</title>
  <link rel="stylesheet" href="src/style/login.css">
</head>
<body>
  <script>
    (async () => {
    const isAuth = await window.api.isAuthenticated();
    if (isAuth) {
      // 🔁 Redirige automatiquement si déjà connecté
      window.location.href = 'caisse.html';
    }
  })();
  </script>
  <div class="login-container">
      <img src="src/images/logo.png" alt="Logo Dédica'Caisse">
      <h1>Dedica'Caisse</h1>
        <form id="login-form">
          <div class="input-group">
          <label for="username">Nom d'utilisateur</label>
          <input type="text" id="username">
          </div>
          
          <div class="input-group">
          <label for="password">Mot de passe</label>
          <input type="password" id="password">
          </div>

          <div class="input-group">
          <label for="register">Caisse</label>
          <select id="register">
            <option>Caisse 1</option>
            <option>Caisse 2</option>
          </select>
          </div>
          <button type="submit">Connexion</button>
        </form>
      <div id="error-message" style="color: red; margin-top: 10px;"></div>  
  </div>

  <script>
    const form = document.getElementById('login-form');
form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const nom = document.getElementById('username').value;
  const motDePasse = document.getElementById('password').value;

  const result = await window.api.login(nom, motDePasse);
  if (result.success) {
    window.location.href = 'caisse.html';
  } else {
    document.getElementById('error-message').textContent = "Identifiants invalides.";
  }
});


    
  </script>
</body>
</html>
